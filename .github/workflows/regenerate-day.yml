name: Regenerate Specific Day Image

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha a regenerar (YYYY-MM-DD)'
        required: true
        default: '2025-09-29'

jobs:
  regenerate-day:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📥 Install dependencies
      run: npm ci

    # Nota: la regeneración sobrescribe la fila en `daily_images` (upsert por date_key)
    # y el objeto en Storage (upsert: true). No hay "backup a discard" — el histórico
    # anterior se reemplaza. Si necesitas conservarlo, descárgalo del bucket antes de correr.
    - name: 🎨 Generate new image for specific date
      env:
        VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: node scripts/generate-daily-image.js "${{ inputs.date }}"

    - name: 📋 Update images index (desde Supabase)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: node scripts/update-images-index.js

    - name: 🗺️ Generate sitemap
      run: node scripts/generate-sitemap.js

    - name: 📝 Commit and push index/sitemap changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Regenerate"

        git add public/generated-images/images-index.json public/sitemap.xml

        if git diff --staged --quiet; then
          echo "ℹ️ No hay cambios en index/sitemap"
        else
          git commit -m "🔄 Regenerate ${{ inputs.date }}: update index + sitemap"
          git push
          echo "✅ Index/sitemap commiteados"
        fi